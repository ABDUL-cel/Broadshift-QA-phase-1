<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Selenium Test Form</title>
  </head>
  <body>
    <form id="myform">
      <input name="fullname" required>
      <input name="my-password" type="password" required>
      <button type="submit">Submit</button>
    </form>
    <h1 id="result" style="display: none;">Received!</h1>
    
    <script> 
      document.getElementById('myform').addEventListener('submit', function(event) { 
        event.preventDefault(); 
        document.getElementById('result').style.display = 'block';
      });
    </script>
  </body>
</html>
